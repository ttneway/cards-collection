name: Retry Failed Pages Deploy

on:
  workflow_run:
    workflows: ['Deploy to GitHub Pages']
    types: [completed]

jobs:
  retry-once:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1 &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Retry failed deployment jobs once
        uses: actions/github-script@v8
        with:
          script: |
            const runId = context.payload.workflow_run.id
            core.info(`Retrying failed jobs for workflow run ${runId}`)
            await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun-failed-jobs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            })
